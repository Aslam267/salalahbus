<style>

  .vframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000;
    opacity:0;transition:opacity 1.2s ease;pointer-events:none}
  #nav{position:absolute;inset:0;z-index:5;touch-action:none}
  #chrome{position:absolute;inset:0;z-index:6;pointer-events:none;
    transition:opacity .7s ease}
  #counter{position:absolute;top:3.4%;right:4%;text-align:right;color:#cfcabe;
    letter-spacing:.36em;font-size:11px;text-transform:uppercase;transition:opacity .6s}
  #act{display:block;color:#C9A35A;font-size:9.5px;letter-spacing:.42em;margin-bottom:6px}
  #count{font-weight:400;opacity:.92}
  #fs{position:absolute;top:3%;left:4%;pointer-events:auto;background:transparent;
    border:1px solid rgba(255,255,255,.18);color:#cfcabe;width:34px;height:34px;border-radius:50%;
    cursor:pointer;font-size:13px;line-height:1;transition:opacity .6s,background .3s,border-color .3s}
  #fs:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.34)}
  #prog{position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(255,255,255,.07);transition:opacity .6s}
  #progfill{height:100%;width:5.5%;background:linear-gradient(90deg,#C9A35A,#e3c486);transition:width 1.1s ease}
  #hint{position:absolute;bottom:5.4%;left:0;right:0;text-align:center;color:#9b9b94;
    letter-spacing:.42em;font-size:10px;text-transform:uppercase;font-weight:300;transition:opacity 1s}
  #arrows{position:absolute;bottom:5%;left:0;right:0;display:flex;justify-content:center;gap:26px;
    pointer-events:none;transition:opacity .6s}
  .ar{pointer-events:auto;cursor:pointer;color:#bdb9ae;font-size:18px;opacity:.5;transition:opacity .3s;
    width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .ar:hover{opacity:1}
  body.idle #counter,body.idle #fs,body.idle #hint,body.idle #prog,body.idle #arrows{opacity:0}
  body.idle{cursor:none}
  #hint.gone{opacity:0!important}
</style>
</head>
<body>
  <div id="deck">

slides[17] = `<meta charset="utf-8">

/* ============================================================
   HERO IMAGES — manage ALL 18 slides from this one list.
   Paste a direct image URL (ending .jpg / .webp) between the
   quotes. Leave '' empty to keep that slide's cinematic CSS art.
   Specs: 16:9, high-res (2560x1440+), hosted at a public URL.
   ============================================================ */
const heroes = [
  '', // 01 Title        — green misted mountains, monsoon
  '', // 02 Departure    — golden UAE desert at dawn, coach
  '', // 03 Road South   — long highway, vast arid, vanishing point
  '', // 04 Border       — night crossing, sodium lights, blue-black
  '', // 05 Terrain Turns— rugged climbing road, cold pre-dawn
  '', // 06 Mist         — road into thick fog, headlights
  '', // 07 Reveal       — emerald valley, cloud in valleys, waterfall
  '', // 08 Waterfalls   — Wadi Darbat scale, mist plume
  '', // 09 Cloud        — cloud streaming between green ridges
  '', // 10 Emerald Mtns — sweeping Jebel Samhan, tiny road for scale
  '', // 11 Coast        — Mughsail cliffs, crashing surf, mist
  '', // 12 Villages     — Jebali highland homes, dusk, smoke
  '', // 13 Coconut      — dense grove, dappled light, fronds
  '', // 14 Frankincense — gnarled Boswellia, resin, warm light
  '', // 15 Ancient Coast— Khor Rori, dhow / harbour, gold dusk
  '', // 16 Summit       — panorama, huge sky, ridges below
  '', // 17 Road Home    — golden dusk road, green fading
  ''  // 18 Realization  — quiet green-misted frame (optional)
];

/* Make Slides 05 & 07 behave like the rest: tag their drawn
   scenery with .scene and give them the same auto-hide script,
   so a real photo lands clean under the grade. (No design change —
   only adds the hide-on-photo behavior the other slides already have.) */
[4,6].forEach(function(i){
  slides[i] = slides[i]
    .replace('class="layer ridges"','class="layer ridges scene"')
    .replace('class="layer valmist1"','class="layer valmist1 scene"')
    .replace('class="layer valmist2"','class="layer valmist2 scene"');
  slides[i] += "<script>(function(){var v=getComputedStyle(document.documentElement).getPropertyValue('--hero-image').trim();if(v&&v!=='none'){document.querySelectorAll('.scene').forEach(function(el){el.style.display='none';});}})();<\/script>";
});

/* Inject the hero photography into the image slots. */
heroes.forEach(function(u,i){ if(u) slides[i] = slides[i].replace('--hero-image:none', "--hero-image:url('"+u+"')"); });

/* ---- ACT MAP ---- */
const acts = [
  {name:'Act I — The Familiar',   from:0,  to:2},
  {name:'Act II — The Threshold', from:3,  to:5},
  {name:'Act III — The Revelation',from:6, to:6},
  {name:'Act IV — The Green World',from:7, to:14},
  {name:'Act V — Reflection',     from:15, to:17}
];
function actIndexOf(i){ for(let a=0;a<acts.length;a++){ if(i>=acts[a].from && i<=acts[a].to) return a; } return 0; }

/* ---- SHELL STATE ---- */
const fa=document.getElementById('fa'), fb=document.getElementById('fb');
const counter=document.getElementById('count'), actLbl=document.getElementById('act');
const progfill=document.getElementById('progfill'), hint=document.getElementById('hint');
let frontEl=fa, backEl=fb, cur=0, busy=false;

function pad(n){ return (n<10?'0':'')+n; }
function updateChrome(){
  counter.textContent = pad(cur+1)+' / 18';
  actLbl.textContent = acts[actIndexOf(cur)].name;
  progfill.style.width = ((cur+1)/18*100)+'%';
  if(cur>0) hint.classList.add('gone');
}

/* initial mount */
fa.srcdoc = slides[0];
fa.style.opacity = 1;
updateChrome();

function show(target){
  target = Math.max(0, Math.min(17, target));
  if(target===cur || busy) return;
  busy = true;
  const crossingAct = actIndexOf(target)!==actIndexOf(cur);
  const oldFront = frontEl;
  let total;

  if(crossingAct){
    oldFront.style.transition='opacity .8s ease';
    oldFront.style.opacity = 0;
    setTimeout(function(){
      backEl.srcdoc = slides[target];
      backEl.style.transition='opacity 0s';
      backEl.style.opacity = 0;
      void backEl.offsetWidth;
      backEl.style.transition='opacity .9s ease';
      backEl.style.opacity = 1;
    }, 1050); /* fade out 800 + black hold 250 */
    total = 1050 + 900;
  } else {
    backEl.srcdoc = slides[target];
    backEl.style.transition='opacity 0s';
    backEl.style.opacity = 0;
    void backEl.offsetWidth;
    oldFront.style.transition='opacity 1.2s ease';
    backEl.style.transition='opacity 1.2s ease';
    oldFront.style.opacity = 0;
    backEl.style.opacity = 1;
    total = 1200;
  }

  cur = target;
  updateChrome();

  setTimeout(function(){
    oldFront.srcdoc = '';            /* unmount to stop its animations */
    const t=frontEl; frontEl=backEl; backEl=t;
    busy = false;
  }, total + 80);
}
function next(){ show(cur+1); }
function prev(){ show(cur-1); }

/* ---- keyboard ---- */
window.addEventListener('keydown', function(e){
  switch(e.key){
    case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ': case 'Spacebar':
      e.preventDefault(); next(); break;
    case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
      e.preventDefault(); prev(); break;
    case 'Home': e.preventDefault(); show(0); break;
    case 'End': e.preventDefault(); show(17); break;
    case 'f': case 'F': toggleFS(); break;
  }
});

/* ---- tap + swipe ---- */
const nav=document.getElementById('nav');
let tsx=0, tsy=0, tst=0, moved=false;
nav.addEventListener('touchstart', function(e){
  const t=e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; tst=Date.now(); moved=false;
}, {passive:true});
nav.addEventListener('touchmove', function(){ moved=true; }, {passive:true});
nav.addEventListener('touchend', function(e){
  const t=e.changedTouches[0]; const dx=t.clientX-tsx, dy=t.clientY-tsy;
  if(Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy)){ dx<0 ? next() : prev(); }
  else if(!moved && (Date.now()-tst)<350){ tapZone(t.clientX); }
});
nav.addEventListener('click', function(e){ tapZone(e.clientX); });
function tapZone(x){ (x < window.innerWidth*0.32) ? prev() : next(); }

/* ---- wheel (desktop) ---- */
let wheelLock=false;
window.addEventListener('wheel', function(e){
  if(wheelLock || Math.abs(e.deltaY)<18) return;
  wheelLock=true; (e.deltaY>0)?next():prev();
  setTimeout(function(){ wheelLock=false; }, 900);
}, {passive:true});

/* ---- arrows + fullscreen buttons ---- */
document.getElementById('next').addEventListener('click', function(e){ e.stopPropagation(); next(); });
document.getElementById('prev').addEventListener('click', function(e){ e.stopPropagation(); prev(); });
const deck=document.getElementById('deck');
function toggleFS(){
  const d=document.fullscreenElement||document.webkitFullscreenElement;
  if(!d){ (deck.requestFullscreen||deck.webkitRequestFullscreen||function(){}).call(deck); }
  else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }
}
document.getElementById('fs').addEventListener('click', function(e){ e.stopPropagation(); toggleFS(); });

/* ---- idle chrome auto-hide ---- */
let idleT;
function activity(){
  document.body.classList.remove('idle');
  clearTimeout(idleT);
  idleT=setTimeout(function(){ document.body.classList.add('idle'); }, 3500);
}
['mousemove','keydown','touchstart','click','wheel'].forEach(function(ev){
  window.addEventListener(ev, activity, {passive:true});
});
activity();
</script>
