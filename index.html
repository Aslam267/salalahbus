<style>

    font-family:'Inter',system-ui,-apple-system,sans-serif;overscroll-behavior:none}
  #deck{position:fixed;inset:0;background:#000;overflow:hidden;touch-action:none}
  .vframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000;
    opacity:0;transition:opacity 1.2s ease;pointer-events:none}
  #nav{position:absolute;inset:0;z-index:5;touch-action:none}
  #chrome{position:absolute;inset:0;z-index:6;pointer-events:none;
    transition:opacity .7s ease}
  #counter{position:absolute;top:3.4%;right:4%;text-align:right;color:#cfcabe;
    letter-spacing:.36em;font-size:11px;text-transform:uppercase;transition:opacity .6s}
  #act{display:block;color:#C9A35A;font-size:9.5px;letter-spacing:.42em;margin-bottom:6px}
  #count{font-weight:400;opacity:.92}
  #fs{position:absolute;top:3%;left:4%;pointer-events:auto;background:transparent;
    border:1px solid rgba(255,255,255,.18);color:#cfcabe;width:34px;height:34px;border-radius:50%;
    cursor:pointer;font-size:13px;line-height:1;transition:opacity .6s,background .3s,border-color .3s}
  #fs:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.34)}
  #loader{position:absolute;top:3.2%;left:50%;transform:translateX(-50%);z-index:7;pointer-events:auto;text-align:center}
  #filepick{display:none}
  #loadbtn{display:inline-block;cursor:pointer;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:#0c0c0c;background:#C9A35A;padding:9px 17px;border-radius:30px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,.45)}
  #loadbtn:active{opacity:.85}
  #loadnote{margin-top:7px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#a8a8a0}
  #prog{position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(255,255,255,.07);transition:opacity .6s}
  #progfill{height:100%;width:5.5%;background:linear-gradient(90deg,#C9A35A,#e3c486);transition:width 1.1s ease}
  #hint{position:absolute;bottom:5.4%;left:0;right:0;text-align:center;color:#9b9b94;
    letter-spacing:.42em;font-size:10px;text-transform:uppercase;font-weight:300;transition:opacity 1s}
  #arrows{position:absolute;bottom:5%;left:0;right:0;display:flex;justify-content:center;gap:26px;
    pointer-events:none;transition:opacity .6s}
  .ar{pointer-events:auto;cursor:pointer;color:#bdb9ae;font-size:18px;opacity:.5;transition:opacity .3s;
    width:30px;height:30px;display:flex;align-items:center;justify-content:center}
  .ar:hover{opacity:1}
  body.idle #counter,body.idle #fs,body.idle #hint,body.idle #prog,body.idle #arrows{opacity:0}
  body.idle{cursor:none}
  #hint.gone{opacity:0!important}
</style>
</head>

      <div id="hint">Swipe &nbsp;·&nbsp; Arrow keys &nbsp;·&nbsp; F for fullscreen</div>
